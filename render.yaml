services:
  - type: web
    name: portfolio-admin
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: BACKEND_URL
        value: https://portfolio-backend-ro4m.onrender.com
      - key: VITE_BASE_PATH
        value: /
      - key: VITE_BACKEND_URL
        value: https://portfolio-backend-ro4m.onrender.com
      - key: VITE_FRONTEND_URL
        value: https://portfolio-frontend-oc7t.onrender.com
